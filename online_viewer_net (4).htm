<!DOCTYPE html>
<html>
<head>
    <title>Data Storage App</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#667eea,#764ba2);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .box{
            background:white;
            width:350px;
            padding:25px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
        }

        input{
            width:100%;
            padding:12px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:10px;
            background:#667eea;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#4b5ed7;
        }

        #result{
            margin-top:20px;
            background:#f2f2f2;
            padding:15px;
            border-radius:8px;
        }
    </style>

</head>

<body>

<div class="box">

<h2>Student Data</h2>

<input id="name" type="text" placeholder="Enter Name">

<input id="email" type="email" placeholder="Enter Email">

<input id="phone" type="number" placeholder="Enter Phone">

<button onclick="saveData()">Save Data</button>

<button onclick="loadData()">Show Data</button>

<button onclick="clearData()">Delete Data</button>


<div id="result">
No Data Available
</div>

</div>


<script src="script.js"></script>

</body>
</html>
